<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>HTV – Henbadhoo Television</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* Fonts */
@font-face{
    font-family:Eamaan;
    src:url("Mv_Eamaan_XP.otf");
}
@font-face{
    font-family:TanHeadline;
    src:url("TAN-HEADLINE.otf");
}

/* Language classes */
.dv{
    font-family:Eamaan;
    direction:rtl;
    text-align:right;
}
.en{
    font-family:sans-serif;
    direction:ltr;
    text-align:left;
    font-weight:bold;
}

/* Body */
body{
    margin:0;
    background:url("background.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
    font-family:sans-serif;
}
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
    z-index:-1;
}

/* Navbar */
nav{
    position:sticky;
    top:0;
    backdrop-filter:blur(18px);
    background:rgba(255,255,255,0.08);
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 30px;
    border-radius:12px;
    margin:10px;
    z-index:1000;
    transition:0.3s;
}
nav:hover{
    background:rgba(255,255,255,0.12);
}
.logo{
    display:flex;
    align-items:center;
    gap:12px;
}
.logo img{
    width:36px;
    height:36px;
    transition: transform 0.3s;
}
.logo img:hover{
    transform:rotate(15deg);
}
nav a{
    margin-left:20px;
    text-decoration:none;
    color:white;
    opacity:.8;
    transition:0.3s;
}
nav a:hover{
    opacity:1;
    color:#00fff5;
    transform:scale(1.1);
}

/* Hero */
.hero{
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:100px 20px;
    flex-direction:column;
}
.bio{
    font-family:TanHeadline;
    font-size:30px;
    max-width:900px;
    line-height:1.5;
    background: rgba(255,255,255,0.05);
    padding:20px 30px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
    transition:0.3s;
}
.bio:hover{
    box-shadow:0 15px 60px rgba(0,0,0,0.7);
}

/* Sections */
.section{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
}

/* Glass effect */
.glass{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 50px rgba(0,0,0,.6);
    transition:0.3s;
}
.glass:hover{
    box-shadow:0 15px 60px rgba(0,0,0,.7);
}

/* Live */
.live-header{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:15px;
}
.live-badge{
    background:red;
    padding:6px 12px;
    border-radius:8px;
    font-weight:bold;
}

/* Player */
.player-area{
    position:relative;
    overflow:hidden;
    border-radius:16px;
    transition:0.3s;
    width:100%;
    height:0;
    padding-bottom:56.25%; /* 16:9 Aspect Ratio */
}
.player-area iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}

/* Watermark at top-right inside player */
.watermark{
    position:absolute;
    top:10px;
    right:10px;
    background:rgba(0,0,0,0.6);
    padding:8px 12px;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

/* Search */
.search{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    background:rgba(255,255,255,0.1);
    color:white;
    margin-bottom:30px;
}

/* Video grid */
.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}
.video-card{
    background:rgba(255,255,255,0.06);
    border-radius:18px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}
.video-card:hover{
    transform:scale(1.05);
    box-shadow:0 15px 45px rgba(0,0,0,0.7);
}
.video-card img{
    width:100%;
    display:block;
}
.video-title{
    padding:12px;
    font-size:20px;
    transition:0.3s;
}
.video-title.dv{
    font-family:Eamaan;
    direction:rtl;
    text-align:right;
}
.video-title.en{
    font-family:sans-serif;
    font-weight:bold;
    direction:ltr;
    text-align:left;
}

/* Footer */
footer{
    text-align:center;
    padding:50px;
    opacity:.6;
}

/* Mobile */
@media(max-width:700px){
    .player-area iframe{
        height:260px;
    }
    .bio{
        font-size:24px;
    }
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
<div class="logo">
    <img src="icon.png" alt="HTV Logo">
</div>
<div>
    <a href="#live" class="en">Live</a>
    <a href="#videos" class="en">Videos</a>
</div>
</nav>

<!-- Hero -->
<div class="hero">
<div class="bio en">
📺 HTV – Henbadhoo Television<br>
Broadcasting with integrity, creativity, and cultural pride. 🌊✨
</div>
</div>

<!-- Live Section -->
<section class="section" id="live">
<div class="live-header">
    <span class="live-badge">🔴 LIVE</span>
    <span class="en">HTV Broadcast</span>
</div>
<div class="glass">
    <div class="player-area">
        <div class="watermark">HTV</div>
        <iframe id="livePlayer" allowfullscreen></iframe>
    </div>
    <p id="noLive" class="en" style="display:none;">No livestreams at the moment</p>
</div>
</section>

<!-- Videos Section -->
<section class="section" id="videos">
<h2 class="en">Latest Videos</h2>
<input class="search" placeholder="Search videos..." id="searchBar">
<div class="video-grid" id="videoGrid"></div>
</section>

<footer class="en">Henbadhoo Television</footer>

<script>
// YouTube API integration
const API_KEY="AIzaSyC1497MZFt9XwL1xZ1mnkpG0zGItimF-vs";
const HANDLE="henbadhootelevision";
let channelId="", videos=[];

async function getChannel(){
    let url=`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${HANDLE}&key=${API_KEY}`;
    let res=await fetch(url);
    let data=await res.json();
    channelId=data.items[0].id;
    loadLive(); loadVideos();
}

async function loadLive(){
    let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&eventType=live&type=video&key=${API_KEY}`;
    let res=await fetch(url);
    let data=await res.json();
    if(data.items.length>0){
        let vid = data.items[0].id.videoId;
        document.getElementById("livePlayer").src=`https://www.youtube.com/embed/${vid}?autoplay=1`;
    }else{
        document.getElementById("livePlayer").style.display="none";
        document.getElementById("noLive").style.display="block";
    }
}

async function loadVideos(){
    let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=18&order=date&type=video&key=${API_KEY}`;
    let res=await fetch(url);
    let data=await res.json();
    videos = data.items;
    renderVideos(videos);
}

function renderVideos(list){
    let grid=document.getElementById("videoGrid");
    grid.innerHTML="";
    list.forEach(v=>{
        let id=v.id.videoId;
        let title=v.snippet.title;
        let cls=/[\u0780-\u07BF]/.test(title)?"dv":"en";
        grid.innerHTML+=`
        <div class="video-card" onclick="window.open('https://youtube.com/watch?v=${id}','_blank')">
            <img src="${v.snippet.thumbnails.high.url}">
            <div class="video-title ${cls}">${title}</div>
        </div>`;
    });
}

document.getElementById("searchBar").addEventListener("input", e=>{
    let term=e.target.value.toLowerCase();
    renderVideos(videos.filter(v=>v.snippet.title.toLowerCase().includes(term)));
});

getChannel();
</script>

</body>
</html>
