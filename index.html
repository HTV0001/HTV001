<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>HTV – Henbadhoo Television</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* Fonts */

@font-face{
font-family:Eamaan;
src:url("Mv_Eamaan_XP.otf");
}

@font-face{
font-family:TanHeadline;
src:url("TAN-HEADLINE.otf");
}

/* Language classes */

.dv{
font-family:Eamaan;
direction:rtl;
text-align:right;
}

.en{
font-family:sans-serif;
direction:ltr;
text-align:left;
}

/* Body */

body{
margin:0;
background:url("background.png");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
font-family:sans-serif;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* Navbar */

nav{
position:sticky;
top:0;
backdrop-filter:blur(14px);
background:rgba(0,0,0,0.45);
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 30px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

.logo img{
width:32px;
height:32px;
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
opacity:.8;
font-family:sans-serif;
}

nav a:hover{
opacity:1;
}

/* Hero */

.hero{
padding:80px 20px;
text-align:center;
}

.bio{
font-family:TanHeadline;
font-size:28px;
}

/* Sections */

.section{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* Glass */

.glass{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
border-radius:16px;
padding:20px;
box-shadow:0 10px 40px rgba(0,0,0,.6);
}

/* Live */

.live-header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:12px;
}

.live-badge{
background:red;
padding:6px 10px;
border-radius:6px;
font-weight:bold;
font-family:sans-serif;
}

/* Player */

.player-area{
position:relative;
overflow:hidden;
border-radius:14px;
}

.player-area iframe{
width:100%;
height:520px;
border:none;
}

/* Watermark */

.watermark{
position:absolute;
bottom:10px;
right:10px;
background:rgba(0,0,0,.6);
padding:6px 10px;
border-radius:6px;
font-weight:bold;
font-family:sans-serif;
}

/* Chat */

.chat{
margin-top:15px;
}

.chat iframe{
width:100%;
height:350px;
border:none;
border-radius:10px;
}

/* Search */

.search{
width:100%;
padding:14px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
margin-bottom:25px;
font-family:sans-serif;
}

/* Video grid */

.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* Video cards */

.video-card{
background:rgba(255,255,255,0.06);
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.video-card:hover{
transform:scale(1.03);
box-shadow:0 10px 30px rgba(0,0,0,.7);
}

.video-card img{
width:100%;
display:block;
}

.video-title{
font-family:Eamaan;
direction:rtl;
text-align:right;
padding:10px;
font-size:20px;
}

/* Footer */

footer{
text-align:center;
padding:40px;
opacity:.6;
font-family:sans-serif;
}

/* Mobile */

@media(max-width:700px){

.player-area iframe{
height:260px;
}

.bio{
font-size:22px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">
<img src="icon.png">
<span class="en">HTV</span>
</div>

<div>
<a href="#live" class="en">Live</a>
<a href="#videos" class="en">Videos</a>
</div>

</nav>

<div class="hero">

<div class="bio en">
📺 HTV – Henbadhoo Television<br>
Broadcasting with integrity, creativity, and cultural pride. 🌊✨
</div>

</div>

<section class="section" id="live">

<div class="live-header">

<span class="live-badge">🔴 LIVE</span>
<span class="en">HTV Broadcast</span>

</div>

<div class="glass">

<div class="player-area">

<iframe id="livePlayer"></iframe>

<div class="watermark">HTV</div>

</div>

<div class="chat">
<iframe id="liveChat"></iframe>
</div>

<p id="noLive" class="en" style="display:none;">
No livestreams at the moment
</p>

</div>

</section>

<section class="section" id="videos">

<h2 class="en">Latest Videos</h2>

<input class="search" placeholder="Search videos..." id="searchBar">

<div class="video-grid" id="videoGrid"></div>

</section>

<footer class="en">
Henbadhoo Television
</footer>

<script>

const API_KEY="AIzaSyC1497MZFt9XwL1xZ1mnkpG0zGItimF-vs";
const HANDLE="henbadhootelevision";

let channelId="";
let videos=[];

async function getChannel(){

let url=`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${HANDLE}&key=${API_KEY}`;

let res=await fetch(url);
let data=await res.json();

channelId=data.items[0].id;

loadLive();
loadVideos();

}

async function loadLive(){

let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&eventType=live&type=video&key=${API_KEY}`;

let res=await fetch(url);
let data=await res.json();

if(data.items.length>0){

let videoId=data.items[0].id.videoId;

document.getElementById("livePlayer").src=
`https://www.youtube.com/embed/${videoId}?autoplay=1&modestbranding=1`;

document.getElementById("liveChat").src=
`https://www.youtube.com/live_chat?v=${videoId}&embed_domain=${location.hostname}`;

}else{

document.getElementById("livePlayer").style.display="none";
document.getElementById("liveChat").style.display="none";
document.getElementById("noLive").style.display="block";

}

}

async function loadVideos(){

let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=18&order=date&type=video&key=${API_KEY}`;

let res=await fetch(url);
let data=await res.json();

videos=data.items;

renderVideos(videos);

}

function renderVideos(list){

let grid=document.getElementById("videoGrid");

grid.innerHTML="";

list.forEach(v=>{

let id=v.id.videoId;

grid.innerHTML+=`

<div class="video-card" onclick="window.open('https://youtube.com/watch?v=${id}','_blank')">

<img src="${v.snippet.thumbnails.high.url}">

<div class="video-title dv">

${v.snippet.title}

</div>

</div>

`;

});

}

document.getElementById("searchBar").addEventListener("input",e=>{

let term=e.target.value.toLowerCase();

let filtered=videos.filter(v=>v.snippet.title.toLowerCase().includes(term));

renderVideos(filtered);

});

getChannel();

</script>

</body>
</html>
