<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTV – Henbadhoo Television</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* Fonts */
@font-face{
font-family:Eamaan;
src:url("Mv_Eamaan_XP.otf");
}

@font-face{
font-family:TanHeadline;
src:url("TAN-HEADLINE.otf");
}

/* Base */
body{
margin:0;
background:linear-gradient(135deg,#0f0f0f,#1b1b1b);
color:white;
font-family:system-ui;
}

/* Navbar */
nav{
position:sticky;
top:0;
backdrop-filter:blur(15px);
background:rgba(0,0,0,0.5);
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 30px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
font-weight:bold;
font-size:20px;
}

nav a{
margin-left:20px;
color:white;
text-decoration:none;
opacity:.8;
}

nav a:hover{
opacity:1;
}

/* Hero */
.hero{
padding:70px 20px;
text-align:center;
}

.bio{
font-family:TanHeadline;
font-size:28px;
}

/* Sections */
.section{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* Glass UI */
.glass{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
border-radius:16px;
padding:20px;
box-shadow:0 10px 40px rgba(0,0,0,.6);
}

/* Livestream */
.live-header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.live-badge{
background:red;
padding:6px 10px;
border-radius:6px;
font-weight:bold;
}

.player-area{
position:relative;
overflow:hidden;
border-radius:14px;
}

.player-area iframe{
width:100%;
height:520px;
border:none;
}

.watermark{
position:absolute;
bottom:10px;
right:10px;
background:rgba(0,0,0,.5);
padding:6px 10px;
border-radius:6px;
font-weight:bold;
}

.chat{
margin-top:15px;
}

.chat iframe{
width:100%;
height:350px;
border:none;
border-radius:10px;
}

/* Search */
.search{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
margin-bottom:25px;
}

/* Video grid */
.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.video-card{
background:rgba(255,255,255,0.05);
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.video-card:hover{
transform:scale(1.03);
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

.video-card img{
width:100%;
display:block;
}

.video-title{
font-family:Eamaan;
direction:rtl;
text-align:right;
padding:10px;
font-size:20px;
}

/* Footer */
footer{
text-align:center;
padding:40px;
opacity:.6;
}

@media(max-width:700px){
.player-area iframe{
height:260px;
}

.bio{
font-size:22px;
}
}

</style>
</head>

<body>

<nav>
<div class="logo">📺 HTV</div>
<div>
<a href="#live">Live</a>
<a href="#videos">Videos</a>
</div>
</nav>

<div class="hero">
<div class="bio">
📺 HTV – Henbadhoo Television<br>
Broadcasting with integrity, creativity, and cultural pride. 🌊✨
</div>
</div>

<section class="section" id="live">

<div class="live-header">
<span class="live-badge">🔴 LIVE</span>
<span>HTV Broadcast</span>
</div>

<div class="glass">

<div class="player-area">
<iframe id="livePlayer"></iframe>
<div class="watermark">HTV</div>
</div>

<div class="chat">
<iframe id="liveChat"></iframe>
</div>

<p id="noLive" style="display:none;">No livestreams at the moment</p>

</div>

</section>

<section class="section" id="videos">

<h2>Latest Videos</h2>

<input class="search" placeholder="Search videos..." id="searchBar">

<div class="video-grid" id="videoGrid"></div>

</section>

<footer>
Henbadhoo Television
</footer>

<script>

const API_KEY="AIzaSyC1497MZFt9XwL1xZ1mnkpG0zGItimF-vs";
const HANDLE="henbadhootelevision";

let channelId="";
let videos=[];

async function getChannel(){

let url=`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${HANDLE}&key=${API_KEY}`;

let res=await fetch(url);
let data=await res.json();

channelId=data.items[0].id;

loadLive();
loadVideos();

}

async function loadLive(){

let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&eventType=live&type=video&key=${API_KEY}`;

let res=await fetch(url);
let data=await res.json();

if(data.items.length>0){

let videoId=data.items[0].id.videoId;

document.getElementById("livePlayer").src=
`https://www.youtube.com/embed/${videoId}?autoplay=1&modestbranding=1`;

document.getElementById("liveChat").src=
`https://www.youtube.com/live_chat?v=${videoId}&embed_domain=${location.hostname}`;

}else{

document.getElementById("livePlayer").style.display="none";
document.getElementById("liveChat").style.display="none";
document.getElementById("noLive").style.display="block";

}

}

async function loadVideos(){

let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=18&order=date&type=video&key=${API_KEY}`;

let res=await fetch(url);
let data=await res.json();

videos=data.items;

renderVideos(videos);

}

function renderVideos(list){

let grid=document.getElementById("videoGrid");

grid.innerHTML="";

list.forEach(v=>{

let id=v.id.videoId;

grid.innerHTML+=`

<div class="video-card" onclick="window.open('https://youtube.com/watch?v=${id}','_blank')">

<img src="${v.snippet.thumbnails.high.url}">

<div class="video-title">

${v.snippet.title}

</div>

</div>

`;

});

}

document.getElementById("searchBar").addEventListener("input",e=>{

let term=e.target.value.toLowerCase();

let filtered=videos.filter(v=>v.snippet.title.toLowerCase().includes(term));

renderVideos(filtered);

});

getChannel();

</script>

</body>
</html>
