<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>HTV – Henbadhoo Television</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* Fonts */
@font-face {
    font-family: Eamaan;
    src: url("Mv_Eamaan_XP.otf");
}
@font-face {
    font-family: TanHeadline;
    src: url("TAN-HEADLINE.otf");
}

/* Language classes */
.dv {
    font-family: Eamaan;
    direction: rtl;
    text-align: right;
}
.en {
    font-family: sans-serif;
    direction: ltr;
    text-align: left;
    font-weight: bold;
}

/* Body */
body {
    margin: 0;
    background: url("background.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: white;
    font-family: sans-serif;
}
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.65);
    z-index: -1;
}

/* News Ticker */
.news-bar {
    position: fixed;
    top: 0;
    width: calc(100% - 40px);
    margin: 10px 20px 0 20px;
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    font-family: sans-serif;
    color: white;
    font-weight: bold;
    overflow: hidden;
    white-space: nowrap;
    z-index: 1100;
}
.news-bar marquee {
    width: 100%;
}

/* Navbar */
nav {
    position: sticky;
    top: 60px;
    backdrop-filter: blur(18px);
    background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 30px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    margin: 10px;
    z-index: 1000;
}
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
}
.logo img {
    width: 32px;
    height: 32px;
}
nav a {
    margin-left: 20px;
    text-decoration: none;
    color: white;
    opacity: .8;
}
nav a:hover {
    opacity: 1;
}

/* Hero */
.hero {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 20px;
    min-height: 250px;
    text-align: center;
}
.bio {
    font-family: TanHeadline;
    font-size: 28px;
}

/* Sections */
.section {
    max-width: 1200px;
    margin: auto;
    padding: 40px 20px;
}

/* Glass effect */
.glass {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, .6);
}

/* Live */
.live-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
}
.live-badge {
    background: red;
    padding: 6px 10px;
    border-radius: 6px;
    font-weight: bold;
}

/* Player */
.player-area {
    position: relative;
    overflow: hidden;
    border-radius: 14px;
}
.player-area iframe {
    width: 100%;
    height: 520px;
}

/* Chat */
.chat {
    margin-top: 15px;
}
.chat iframe {
    width: 100%;
    height: 350px;
    border-radius: 10px;
}

/* Search */
.search {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    margin-bottom: 25px;
}

/* Video grid */
.video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}
.video-card {
    background: rgba(255, 255, 255, 0.06);
    border-radius: 14px;
    cursor: pointer;
    transition: .3s;
}
.video-card:hover {
    transform: scale(1.03);
}
.video-card img {
    width: 100%;
}
.video-title {
    padding: 10px;
    font-size: 20px;
}
.video-title.dv {
    font-family: Eamaan;
}
.video-title.en {
    font-family: sans-serif;
    font-weight: bold;
}

/* Footer */
footer {
    text-align: center;
    padding: 40px;
    opacity: .6;
}
</style>
</head>

<body>

<!-- Live News Ticker -->
<div class="news-bar">
  <marquee id="newsTicker" scrollamount="6">Loading latest headlines…</marquee>
</div>

<!-- Navbar -->
<nav>
<div class="logo">
    <img src="icon.png">
    <span class="en">HTV</span>
</div>
<div>
    <a href="#live" class="en">Live</a>
    <a href="#videos" class="en">Videos</a>
</div>
</nav>

<!-- Hero -->
<div class="hero">
    <div class="bio en">
📺 HTV – Henbadhoo Television<br>
Broadcasting with integrity, creativity, and cultural pride. 🌊✨
    </div>
</div>

<!-- Live Section -->
<section class="section" id="live">
<div class="live-header">
    <span class="live-badge">🔴 LIVE</span>
    <span class="en">HTV Broadcast</span>
</div>
<div class="glass">
    <div class="player-area">
        <iframe id="livePlayer"></iframe>
    </div>
    <div class="chat">
        <iframe id="liveChat"></iframe>
    </div>
</div>
</section>

<!-- Videos -->
<section class="section" id="videos">
<h2 class="en">Latest Videos</h2>
<input class="search" placeholder="Search videos…" id="searchBar">
<div class="video-grid" id="videoGrid"></div>
</section>

<footer class="en">
Henbadhoo Television
</footer>

<script>
// YouTube Part (unchanged)
const API_KEY="AIzaSyC1497MZFt9XwL1xZ1mnkpG0zGItimF-vs";
const HANDLE="henbadhootelevision";
let channelId="", videos=[];

async function getChannel(){
    let url=`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${HANDLE}&key=${API_KEY}`;
    let res=await fetch(url);
    let data=await res.json();
    channelId=data.items[0].id;
    loadLive();
    loadVideos();
}
async function loadLive(){
    let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&eventType=live&type=video&key=${API_KEY}`;
    let res=await fetch(url);
    let data=await res.json();
    if(data.items.length>0){
        let id=data.items[0].id.videoId;
        document.getElementById("livePlayer").src=`https://www.youtube.com/embed/${id}?autoplay=1`;
        document.getElementById("liveChat").src=`https://www.youtube.com/live_chat?v=${id}&embed_domain=${location.hostname}`;
    }
}
async function loadVideos(){
    let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=18&order=date&type=video&key=${API_KEY}`;
    let res=await fetch(url);
    let data=await res.json();
    videos=data.items; renderVideos(videos);
}
function renderVideos(list){
    let grid=document.getElementById("videoGrid");
    grid.innerHTML="";
    list.forEach(v=>{
        let id=v.id.videoId, title=v.snippet.title;
        let isDhivehi=/[\u0780-\u07BF]/.test(title);
        let cls=isDhivehi?"dv":"en";
        grid.innerHTML+=`
        <div class="video-card" onclick="window.open('https://youtube.com/watch?v=${id}','_blank')">
            <img src="${v.snippet.thumbnails.high.url}">
            <div class="video-title ${cls}">${title}</div>
        </div>`;
    });
}
document.getElementById("searchBar").addEventListener("input",e=>{
    let term=e.target.value.toLowerCase();
    renderVideos(videos.filter(v=>v.snippet.title.toLowerCase().includes(term)));
});
getChannel();

// 📡 RSS News Ticker
const feeds = [
    "https://www.reutersagency.com/feed/?best-topics=iran-israel-war&post_type=best",
    "http://feeds.bbci.co.uk/news/world/middle_east/rss.xml",
    "https://www.aljazeera.com/xml/rss/all.xml"
];

async function updateTicker() {
    let allTitles = [];
    await Promise.all(feeds.map(async url=>{
        try {
            let res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url));
            let xml = await res.text();
            let parser = new DOMParser();
            let doc = parser.parseFromString(xml, "text/xml");
            doc.querySelectorAll("item > title").forEach(t=>{
                let txt = t.textContent.trim();
                if(!allTitles.includes(txt)) allTitles.push(txt);
            });
        } catch(e) {
            console.warn("Feed failed:", e);
        }
    }));
    if(allTitles.length>0) {
        document.getElementById("newsTicker").textContent = allTitles.join("   ⚡   ");
    }
}

updateTicker();
setInterval(updateTicker, 60*1000);
</script>

</body>
</html>
